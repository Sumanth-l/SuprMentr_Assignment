<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Landing Section</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
}

.hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:60px 10%;
    background:#f4f6f8;
}

.hero-text{
    max-width:500px;
}

.hero-text h1{
    font-size:40px;
    color:#2c3e50;
}

.hero-text p{
    font-size:18px;
    margin:20px 0;
}

.hero-text button{
    padding:12px 25px;
    border:none;
    background:#3498db;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

.hero-text button:hover{
    background:#2980b9;
}

.hero-image img{
    width:350px;
}

/* Responsive for Mobile */
@media (max-width:768px){

.hero{
    flex-direction:column;
    text-align:center;
}

.hero-image img{
    width:250px;
    margin-top:20px;
}

.hero-text h1{
    font-size:30px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="hero-text">
<h1>Build Modern Websites</h1>
<p>Learn Full Stack Development and build responsive, modern web applications.</p>
<button>Get Started</button>
</div>

<div class="hero-image">
<img src="https://via.placeholder.com/350" alt="Landing Image">
</div>

</section>

</body>
</html>
